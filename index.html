<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作業日報</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>作業日報</h1>

    <form id="daily-report-form" class="report-form">
      <section class="card">
        <h2>基本情報</h2>

        <div class="field-grid">
          <div class="field">
            <label for="report-date">日付</label>
            <input type="date" id="report-date" required />
          </div>

          <div class="field">
            <label for="destination-company">行先会社名</label>
            <input type="text" id="destination-company" placeholder="例：〇〇株式会社" />
          </div>

          <div class="field">
            <label for="site-name">現場名</label>
            <input type="text" id="site-name" placeholder="例：〇〇港北工区" required />
          </div>

          <div class="field">
            <label for="meeting-place">集合場所</label>
            <input type="text" id="meeting-place" placeholder="例：〇〇港" />
          </div>

          <div class="field">
            <label for="prime-contractor">元請会社名</label>
            <input type="text" id="prime-contractor" placeholder="例：〇〇建設" />
          </div>

          <div class="field">
            <label for="start-time">始業時間</label>
            <input type="time" id="start-time" />
          </div>

          <div class="field">
            <label for="end-time">終業時間</label>
            <input type="time" id="end-time" />
          </div>
        </div>

        <div class="field">
          <label for="remarks">その他</label>
          <textarea id="remarks" rows="4" placeholder="連絡事項など"></textarea>
        </div>
      </section>

      <section class="card">
        <h2>潜水作業員</h2>
        <div id="diver-list" class="worker-grid"></div>
      </section>

      <section class="card">
        <h2>陸上作業員</h2>
        <div id="land-list" class="worker-grid"></div>
      </section>

      <section class="card">
        <h2>待機</h2>
        <div id="standby-list" class="worker-grid"></div>
      </section>

      <section class="card">
        <h2>移動</h2>
        <div id="moving-list" class="worker-grid"></div>
      </section>

      <div class="action-area">
        <button id="send-button" type="button" class="primary-button">送信</button>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
